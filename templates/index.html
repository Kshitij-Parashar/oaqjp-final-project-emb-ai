<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        textarea { width: 100%; height: 100px; padding: 10px; font-size: 16px; }
        button { margin-top: 10px; padding: 10px 20px; background: #0062ff; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 4px; }
        button:hover { background: #0043ce; }
        #result { margin-top: 20px; padding: 15px; background: #f4f4f4; border-radius: 4px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Emotion Detector</h1>
    <p>Enter text below to detect the emotions expressed:</p>
    <textarea id="textToAnalyse" placeholder="Type your text here..."></textarea>
    <br>
    <button onclick="analyzeEmotion()">Analyze Emotion</button>
    <div id="result"></div>

    <script>
        function analyzeEmotion() {
            const text = document.getElementById('textToAnalyse').value;
            fetch('/emotionDetector?textToAnalyse=' + encodeURIComponent(text))
                .then(response => response.text())
                .then(data => {
                    document.getElementById('result').innerHTML = data;
                })
                .catch(error => {
                    document.getElementById('result').innerHTML = 'Error: ' + error;
                });
        }
    </script>
</body>
</html>
